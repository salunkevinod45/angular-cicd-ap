name: CI pipeline

on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install

      - run: npm run test

      - run: npm start &

      - run: npx wait-on http://localhost:4200

      - run: npm run e2e

      - run: npm run build
